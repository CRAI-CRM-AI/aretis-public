name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /aretis-public/
      - name: Prerender static HTML
        env:
          NODE_ENV: production
          NITRO_HOST: 127.0.0.1
          NITRO_PORT: 3000
        run: |
          node .output/server/index.mjs &
          SERVER_PID=$!
          echo "Waiting for server (PID $SERVER_PID)..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/ -o /dev/null 2>&1; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
          done
          curl -f http://127.0.0.1:3000/ -o .output/public/index.html
          SIZE=$(wc -c < .output/public/index.html)
          echo "Captured index.html (${SIZE} bytes)"
          if [ "$SIZE" -lt 100 ]; then
            echo "ERROR: index.html is too small, prerender failed"
            cat .output/public/index.html
            exit 1
          fi
          cp .output/public/index.html .output/public/404.html
          touch .output/public/.nojekyll
          kill $SERVER_PID
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

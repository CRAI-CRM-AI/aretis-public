name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          BASE_PATH: /aretis-public/
      - name: Prerender static HTML
        env:
          NODE_ENV: production
          NITRO_HOST: 127.0.0.1
          NITRO_PORT: 3000
        run: |
          node .output/server/index.mjs &
          SERVER_PID=$!
          node --input-type=module -e "
            const maxRetries = 30;
            for (let i = 1; i <= maxRetries; i++) {
              try {
                const res = await fetch('http://127.0.0.1:3000/');
                const html = await res.text();
                if (html.length < 100) throw new Error('Response too small: ' + html.length + ' bytes');
                const fs = await import('node:fs');
                fs.writeFileSync('.output/public/index.html', html);
                fs.writeFileSync('.output/public/404.html', html);
                fs.writeFileSync('.output/public/.nojekyll', '');
                console.log('Prerendered index.html (' + html.length + ' bytes)');
                process.exit(0);
              } catch (e) {
                if (i === maxRetries) { console.error('Failed:', e.message); process.exit(1); }
                await new Promise(r => setTimeout(r, 1000));
              }
            }
          "
          kill $SERVER_PID 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
